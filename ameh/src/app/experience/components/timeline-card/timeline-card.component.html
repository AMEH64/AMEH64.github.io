<mat-card>
  <mat-card-header>
    <img mat-card-avatar src="assets/images/{{ experience.organization.logo }}" />
    <mat-card-title class="">{{ experience.organization.name }}</mat-card-title>
    <mat-card-title class="">{{ experience.position.title }}</mat-card-title>
    <mat-card-subtitle
      ><mat-icon>date_range</mat-icon
      >{{ experience.position.start | date: "MMMM, yyyy" }}&nbsp;&nbsp;-&nbsp;&nbsp;{{
        !!experience.position.end ? (experience.position.end | date: "MMMM, yyyy") : "Present"
      }}
    </mat-card-subtitle>
  </mat-card-header>
  <mat-card-content>
    <h2>{{ experience.position.title }}</h2>
    <p>{{ experience.position.summary }}</p>
    <ameh-skills-chip-list [skills]="experience.position.skills"></ameh-skills-chip-list>
  </mat-card-content>
  <!-- <mat-card-actions>
    <button mat-button>LIKE</button>
    <button mat-button>SHARE</button>
  </mat-card-actions> -->
</mat-card>
