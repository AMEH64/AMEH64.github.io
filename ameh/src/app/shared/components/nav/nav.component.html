<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="(isHandset$ | async) ? 'over' : 'side'"
      [opened]="(isHandset$ | async) === false">
    <mat-toolbar>
      <mat-icon>code</mat-icon>&nbsp;ameh
    </mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="home">
        <mat-icon>home</mat-icon>&nbsp;Home
      </a>
      <a mat-list-item routerLink="experience">
        <mat-icon>work</mat-icon>&nbsp;Experience
      </a>
      <a mat-list-item routerLink="contact">
        <mat-icon>contact_mail</mat-icon>&nbsp;Contact
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary">
      <button
        type="button"
        aria-label="Toggle sidenav"
        mat-icon-button
        (click)="drawer.toggle()"
        *ngIf="isHandset$ | async">
        <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
      </button>
      <ng-content select="[slot='ameh-nav-content']"></ng-content>
    </mat-toolbar>
    <ng-content select="[slot='ameh-main-content']"></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
